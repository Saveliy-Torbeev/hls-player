<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="teleport-site-verification" content="271b872163bf2dea" />
    <title>HLS Player</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- 1. hls.js -->
    <script src="https://cdn.jsdelivr.net/hls.js/latest/hls.min.js"></script>
    <!-- 2. Teleport bundle for hls.js (must go AFTER hls.js) -->
    <script src="https://cdn.teleport.media/stable/teleport.hlsjs.bundle.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
        font-family: "JetBrains Mono", monospace;
        color: #e0e0e0;
      }

      .player-wrap {
        width: 90%;
        max-width: 860px;
        background: #12121a;
        border: 1px solid #2a2a3a;
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 0 60px rgba(80, 60, 220, 0.15),
          0 0 120px rgba(80, 60, 220, 0.05);
      }

      .top-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 18px;
        background: #16161f;
        border-bottom: 1px solid #2a2a3a;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .dot.r {
        background: #ff5f57;
      }
      .dot.y {
        background: #febc2e;
      }
      .dot.g {
        background: #28c840;
      }

      .top-bar span {
        margin-left: 12px;
        font-size: 12px;
        color: #6a6a8a;
        letter-spacing: 1px;
      }

      video {
        display: block;
        width: 100%;
        background: #000;
      }

      .info {
        padding: 16px 18px;
        font-size: 12px;
        color: #5a5a7a;
        border-top: 1px solid #2a2a3a;
        display: flex;
        justify-content: space-between;
      }

      .info .status {
        color: #28c840;
      }
      .info .p2p {
        color: #a78bfa;
      }
    </style>
  </head>
  <body>
    <div class="player-wrap">
      <div class="top-bar">
        <div class="dot r"></div>
        <div class="dot y"></div>
        <div class="dot g"></div>
        <span>HLS STREAM + TELEPORT P2P</span>
      </div>

      <video id="video" controls></video>

      <div class="info">
        <div id="status" class="status">● connecting…</div>
        <div id="p2p-status" class="p2p">p2p: waiting</div>
        <div>teleport + hls.js</div>
      </div>
    </div>

    <script>
      // ====== НАСТРОЙКИ ======
      var STREAM_URL = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";
      var API_KEY = "YOUR_API_KEY"; // <-- Замени на свой ключ из teleport.media
      // =======================

      var videoEl = document.getElementById("video");
      var statusEl = document.getElementById("status");
      var p2pEl = document.getElementById("p2p-status");

      if (Hls.isSupported()) {
        // 1. Создаём hls.js плеер
        var hls = new Hls();
        hls.loadSource(STREAM_URL);
        hls.attachMedia(videoEl);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          statusEl.textContent = "● live";
          videoEl.play().catch(function () {});
        });

        hls.on(Hls.Events.ERROR, function (_, data) {
          statusEl.textContent = "● error";
          statusEl.style.color = "#ff5f57";
          if (data.fatal) hls.destroy();
        });

        // 2. Инициализируем Teleport P2P
        teleport
          .initialize({
            apiKey: d64543f8bcf68323,
            loader: {
              type: "hlsjs", // тип плагина
              params: {
                hlsjs: hls, // передаём экземпляр hls.js
              },
            },
          })
          .then(function (instance) {
            p2pEl.textContent = "p2p: active ✓";
            console.log("Teleport P2P initialized", instance);

            // Освобождаем ресурсы при закрытии
            window.addEventListener("unload", function () {
              instance.dispose();
            });
          })
          .catch(function (err) {
            p2pEl.textContent = "p2p: error";
            p2pEl.style.color = "#ff5f57";
            console.error("Teleport init error:", err);
          });
      } else if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
        // Safari — нативный HLS (Teleport не работает без hls.js)
        videoEl.src = STREAM_URL;
        videoEl.addEventListener("loadedmetadata", function () {
          statusEl.textContent = "● live";
          p2pEl.textContent = "p2p: n/a (native)";
          videoEl.play().catch(function () {});
        });
      } else {
        statusEl.textContent = "● HLS not supported";
        statusEl.style.color = "#ff5f57";
      }
    </script>
  </body>
</html>
